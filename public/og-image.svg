<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg1" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#2a4a1a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#111a11" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="80%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#111a11" stop-opacity="0"/>
    </radialGradient>
    <pattern id="diag" patternUnits="userSpaceOnUse" width="28" height="28" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="28" stroke="rgba(245,166,35,0.04)" stroke-width="1.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#111a11"/>
  <rect width="1200" height="630" fill="url(#bg1)"/>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <rect width="1200" height="630" fill="url(#diag)"/>

  <!-- Bunting flags top -->
  <g opacity="0.9">
    <polygon points="40,0 80,0 60,38" fill="#e74c3c"/>
    <polygon points="90,0 130,0 110,38" fill="#f39c12"/>
    <polygon points="140,0 180,0 160,38" fill="#2ecc71"/>
    <polygon points="190,0 230,0 210,38" fill="#3498db"/>
    <polygon points="240,0 280,0 260,38" fill="#9b59b6"/>
    <polygon points="290,0 330,0 310,38" fill="#e74c3c"/>
    <polygon points="340,0 380,0 360,38" fill="#f39c12"/>
    <polygon points="390,0 430,0 410,38" fill="#2ecc71"/>
    <polygon points="440,0 480,0 460,38" fill="#3498db"/>
    <polygon points="490,0 530,0 510,38" fill="#9b59b6"/>
    <polygon points="540,0 580,0 560,38" fill="#e74c3c"/>
    <polygon points="590,0 630,0 610,38" fill="#f39c12"/>
    <polygon points="640,0 680,0 660,38" fill="#2ecc71"/>
    <polygon points="690,0 730,0 710,38" fill="#3498db"/>
    <polygon points="740,0 780,0 760,38" fill="#9b59b6"/>
    <polygon points="790,0 830,0 810,38" fill="#e74c3c"/>
    <polygon points="840,0 880,0 860,38" fill="#f39c12"/>
    <polygon points="890,0 930,0 910,38" fill="#2ecc71"/>
    <polygon points="940,0 980,0 960,38" fill="#3498db"/>
    <polygon points="990,0 1030,0 1010,38" fill="#9b59b6"/>
    <polygon points="1040,0 1080,0 1060,38" fill="#e74c3c"/>
    <polygon points="1090,0 1130,0 1110,38" fill="#f39c12"/>
    <polygon points="1140,0 1180,0 1160,38" fill="#2ecc71"/>
    <!-- bunting string -->
    <line x1="40" y1="0" x2="1180" y2="0" stroke="rgba(245,166,35,0.3)" stroke-width="2"/>
  </g>

  <!-- Card -->
  <rect x="80" y="80" width="1040" height="470" rx="24" fill="#1c2a18" stroke="rgba(245,166,35,0.45)" stroke-width="2"/>

  <!-- Eyebrow -->
  <text x="600" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#f5a623" letter-spacing="6" font-weight="400" opacity="0.9">HERZLICHE EINLADUNG</text>

  <!-- Emojis row -->
  <text x="600" y="260" text-anchor="middle" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" font-size="72">🎂 🚲 🧺</text>

  <!-- Main title -->
  <text x="600" y="350" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="58" fill="#f5edd6" font-weight="700" letter-spacing="1">Katherine</text>
  <text x="600" y="415" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="38" fill="#f5a623" font-weight="400" letter-spacing="2">hat Geburtstag 🎂</text>

  <!-- Subtitle -->
  <text x="600" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#b8c9a8" letter-spacing="1">Picknick · Fahrradtour · Party · Feier</text>

  <!-- Bottom URL -->
  <text x="600" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="rgba(245,166,35,0.5)" letter-spacing="1">mi-cumple-five.vercel.app</text>

  <!-- Bunting flags bottom -->
  <g opacity="0.9">
    <polygon points="40,630 80,630 60,592" fill="#e74c3c"/>
    <polygon points="140,630 180,630 160,592" fill="#2ecc71"/>
    <polygon points="240,630 280,630 260,592" fill="#9b59b6"/>
    <polygon points="340,630 380,630 360,592" fill="#f39c12"/>
    <polygon points="440,630 480,630 460,592" fill="#3498db"/>
    <polygon points="540,630 580,630 560,592" fill="#e74c3c"/>
    <polygon points="640,630 680,630 660,592" fill="#2ecc71"/>
    <polygon points="740,630 780,630 760,592" fill="#9b59b6"/>
    <polygon points="840,630 880,630 860,592" fill="#f39c12"/>
    <polygon points="940,630 980,630 960,592" fill="#3498db"/>
    <polygon points="1040,630 1080,630 1060,592" fill="#e74c3c"/>
    <polygon points="1140,630 1180,630 1160,592" fill="#2ecc71"/>
    <line x1="40" y1="630" x2="1180" y2="630" stroke="rgba(245,166,35,0.3)" stroke-width="2"/>
  </g>
